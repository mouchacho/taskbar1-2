function mvDesc(mv){const md=MV[mv];if(!md)return"";

  const L=[];
  L.push(`Type ${TYPE_FR[ty]} · ${cat==="P"?"Physique 👊":cat==="S"?"Spéciale 🔮":"Statut"}`);
  if(pw>0)L.push(`Puissance ${pw}`);
  L.push(`Précision ${acc>=999?"— (n'échoue jamais)":acc+"%"}`);
  L.push(`Cadence ${(cd/1000).toFixed(1)}s`);
  const E=[];
  if(fx.aoe)E.push("Touche TOUS les adversaires (75% des dégâts chacun)");
  if(fx.drain)E.push(`Soigne le lanceur de ${fx.drain}% des dégâts infligés`);
  if(fx.recoil)E.push(`Le lanceur subit ${fx.recoil}% des dégâts en recul`);
  if(fx.selfKO)E.push("Le lanceur tombe K.O. après usage !");
  if(fx.brn)E.push(`${fx.brn}% de chances de BRÛLER la cible`);
  if(fx.par)E.push(`${fx.par}% de chances de PARALYSER la cible`);
  if(fx.frz)E.push(`${fx.frz}% de chances de GELER la cible`);
  if(fx.psn)E.push(`${fx.psn}% de chances d'EMPOISONNER la cible`);
  if(fx.slp)E.push(`Endort la cible`);
  if(fx.tDn)E.push(`${fx.tDn[1]}% de chances de baisser ${STAT_FR[fx.tDn[0]]} de la cible`);
  if(fx.tUp)E.push(`Augmente ${STAT_FR[fx.tUp[0]]} de la cible`);
  if(fx.sUp)E.push(`Augmente ${STAT_FR[fx.sUp[0]]} du lanceur`);
  if(fx.sDn)E.push(`Baisse ${STAT_FR[fx.sDn[0]]} du lanceur après usage`);
  if(fx.healSelf)E.push(`Le lanceur récupère ${fx.healSelf}% de ses PV max`);
  if(fx.healAlly)E.push(`Soigne l'allié le plus blessé de ${fx.healAlly}% de ses PV max`);
  if(fx.steal)E.push("Vole l'objet tenu de la cible si le lanceur n'en porte pas");
  if(fx.none)E.push("...n'a absolument aucun effet.");

function dmgCalc(att,mvName,defMon,defStats,attStats){
  const m=MV[mvName];if(!m)return{dmg:1,eff:1};
  const[pw,ty,,cat]=m;const d=DEX[att.sp];const dd=DEX[defMon.sp];
  const phys=cat==="P";
  const am=att.mod||{},dm=defMon.mod||{};
  let A=(phys?attStats.atk*(am.atk||1):attStats.spa*(am.spa||1));
  const D=(phys?defStats.def*(dm.def||1):defStats.spd*(dm.spd||1));
  if(att.status==="brn"&&phys)A*=0.5; // brûlure : Attaque physique halvée (officiel)
  const stab=(ty===d.t1||ty===d.t2)?1.5:1;
  const eff=tEff(ty,dd.t1,dd.t2);
  let itemMult=1;const it=att.item&&HELD[att.item];
  if(it){if(it.type===ty)itemMult*=it.mult;else if(it.stat==="atk"&&phys)itemMult*=it.mult;else if(it.stat==="spa"&&!phys)itemMult*=it.mult;}
  const base=(((2*att.lv/5+2)*pw*A/Math.max(1,D))/50+2)*stab*eff*itemMult*(0.85+Math.random()*0.15);
  return{dmg:Math.max(1,Math.floor(base)),eff};
}
function modStep(e,stat,down){ // ±8% par cran, bornes 0.6–1.4

}

// ── SPRITES (multi-CDN + fallback SVG pour Safari iOS) ─────────────────────
function PixelMon({sp,size,shiny}){
  // fallback pixel-art procédural déterministe (8x8 symétrique)
  const d=DEX[sp]||{t1:"Normal"};
  const c1=TC[d.t1]||"#888",c2=d.t2?TC[d.t2]:"#ffffff";
  let seed=sp*2654435761>>>0;const rnd=()=>{seed^=seed<<13;seed^=seed>>>17;seed^=seed<<5;return((seed>>>0)%1000)/1000;};
  const px=[];const G=8,u=size/G;
  for(let y=0;y<G;y++)for(let x=0;x<G/2;x++){
    if(rnd()>0.45){const col=rnd()>0.75?c2:c1;
      px.push(<rect key={y+"-"+x} x={x*u} y={y*u} width={u} height={u} fill={col}/>);
      px.push(<rect key={y+"m"+x} x={(G-1-x)*u} y={y*u} width={u} height={u} fill={col}/>);}
  }
  return(<svg width={size} height={size} style={{filter:shiny?"hue-rotate(120deg) drop-shadow(0 0 4px gold)":"none"}}>{px}</svg>);
}
function Sprite({sp,shiny,back,size=64,style={}}){
  const[src,setSrc]=useState(0);
  useEffect(()=>setSrc(0),[sp,shiny,back]);
  const d=DEX[sp]||{name:"?",t1:"Normal"};
  const dir=`${back?"back/":""}${shiny?"shiny/":""}`;
  const p3=String(sp).padStart(3,"0");
  const slug=ESLUG[sp];
  const anim=`${back?"back-":""}${shiny?"shiny":"normal"}`;
  const urls=[
    `https://img.pokemondb.net/sprites/black-white/anim/${anim}/${slug}.gif`,
    `https://img.pokemondb.net/sprites/black-white/${anim}/${slug}.png`,
    `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${dir}${sp}.png`,
    `https://cdn.jsdelivr.net/gh/PokeAPI/sprites@master/sprites/pokemon/${dir}${sp}.png`,
    `https://assets.pokemon.com/assets/cms2/img/pokedex/detail/${p3}.png`,
  ];
  if(src>=urls.length)return <PixelMon sp={sp} size={size} shiny={shiny}/>;
  return(<img src={urls[src]} width={size} height={size} alt={d.name} onError={()=>setSrc(v=>v+1)}
    style={{imageRendering:"pixelated",filter:shiny?"drop-shadow(0 0 4px gold)":"none",transform:"none",...style}}/>);
}

function zoneKind(name){
  if(/Forêt/.test(name))return"forest";
  if(/Mont|Grotte|Tunnel/.test(name))return"cave";
  if(/Îles|Écume/.test(name))return"water";
  if(/Tour|Manoir/.test(name))return"tower";
  if(/Arène|Sylphe|Ligue/.test(name))return"gym";
  if(/Safari/.test(name))return"safari";
  return"route";
}
const BG_CACHE={};
// ═══ FONDS PIXEL-ART FINS + PARALLAXE ═══════════════════════════════════════
// 3 couches canvas (ciel/décor/sol) défilant à vitesses différentes
const LW=240,LH=95,PXS=2; // grille logique 240×95, pixels 2×2
function mkCtx(){const c=document.createElement("canvas");c.width=LW*PXS;c.height=LH*PXS;return[c,c.getContext("2d")];}
function P(ctx,x,y,c){x=((Math.round(x)%LW)+LW)%LW;ctx.fillStyle=c;ctx.fillRect(x*PXS,Math.round(y)*PXS,PXS,PXS);}
function rectW(ctx,x,y,w,h,c){for(let i=0;i<w;i++)for(let j=0;j<h;j++)P(ctx,x+i,y+j,c);}
function ditherBand(ctx,y0,y1,c1,c2){ // transition douce : damier limité à 2 rangées frontière
  const mid=Math.floor((y0+y1)/2);
  for(let y=y0;y<y1;y++)for(let x=0;x<LW;x++){
    let col;
    if(y<mid-1)col=c1;
    else if(y>mid)col=c2;
    else col=((x+y)%2===0)?c2:c1; // fine frange dithérée
    P(ctx,x,y,col);
  }
}
function skyGrad(ctx,cols,yTop,yBot){ // bandes dithérées successives
  const n=cols.length-1;const bh=(yBot-yTop)/n;
  for(let i=0;i<n;i++)ditherBand(ctx,Math.floor(yTop+i*bh),Math.floor(yTop+(i+1)*bh),cols[i],cols[i+1]);
}
function cloud(ctx,cx,cy,s,body="#ffffff",shade="#d4e2f4",hi="#f6faff"){
  const blobs=[[0,0,9,4],[-6,1,6,3],[6,1,6,3],[-2,-3,6,3],[3,-2,5,2]];
  const RX=Math.ceil(13*s),RY=Math.ceil(8*s);
  for(let ix=-RX;ix<=RX;ix++)for(let iy=-RY;iy<=RY;iy++){
    let inside=false;
    for(const[bx,by,bw,bh]of blobs){
      const dx=ix-bx*s,dy=iy-by*s;
      if((dx*dx)/(bw*bw*s*s)+(dy*dy)/(bh*bh*s*s)<=1){inside=true;break;}
    }
    if(!inside)continue;
    let col=body;
    if(iy>1.5*s)col=shade;
    else if(iy<-2*s&&ix<s)col=hi;
    P(ctx,cx+ix,cy+iy,col);
  }
}
function grassEdge(ctx,yTop,h,c1,c2,c3,rnd){ // bord d'herbe détaillé (3 tons)
  rectW(ctx,0,yTop+2,LW,h-2,c2);
  for(let x=0;x<LW;x++){
    const t=Math.floor(rnd()*3);
    P(ctx,x,yTop+1,c1);if(t>0)P(ctx,x,yTop,c1);if(t>1)P(ctx,x,yTop-1,c1);
    if(rnd()<0.3)P(ctx,x,yTop+2+Math.floor(rnd()*(h-3)),c3);
    if(rnd()<0.25)P(ctx,x,yTop+2+Math.floor(rnd()*(h-3)),c1);
  }
}
function tuft(ctx,x,y,c1,c2){P(ctx,x,y,c2);P(ctx,x,y-1,c1);P(ctx,x+1,y,c1);P(ctx,x+2,y,c2);P(ctx,x+2,y-1,c1);P(ctx,x+1,y-2,c1);}
function flower(ctx,x,y,c){P(ctx,x,y,c);P(ctx,x+1,y,"#fff");P(ctx,x,y+1,"#3a7c2a");}
function treeFine(ctx,x,base,s,dk,md,lt,tr){
  const th=Math.floor(14*s);
  rectW(ctx,x-1,base-th,3,th,tr);P(ctx,x-2,base-Math.floor(th*0.6),tr);P(ctx,x+2,base-Math.floor(th*0.4),tr);
  const cy=base-th-Math.floor(6*s);
  for(let dx=-8;dx<=8;dx++)for(let dy=-6;dy<=6;dy++){
    const d=(dx*dx)/(64*s*s)+(dy*dy)/(36*s*s);
    if(d<=1){const col=dy>2?dk:d>0.55?md:(dx<-2&&dy<0?lt:md);P(ctx,x+dx,cy+dy,col);}
  }
  for(let i=0;i<Math.floor(10*s);i++){const a=Math.random()*6.28,r=Math.random();P(ctx,x+Math.cos(a)*7*s*r,cy-2+Math.sin(a)*3*r,lt);}
}
function mtnFine(ctx,x,base,w,h,c1,c2,snow){
  for(let i=0;i<h;i++){const hw=Math.floor(w*(1-i/h)/2);
    for(let dx=-hw;dx<=hw;dx++)P(ctx,x+dx,base-i,dx>hw*0.4?c2:c1);
    if(snow&&i>h*0.75)for(let dx=-hw;dx<=hw;dx++)if((dx+i)%3!==0)P(ctx,x+dx,base-i,"#e8f0f8");
  }
}
function seaBand(ctx,y0,y1,rnd){
  const rows=["#5a90d8","#4a80cc","#4478c4","#3e70bc","#3a68b4"];
  for(let y=y0;y<y1;y++)rectW(ctx,0,y,LW,1,rows[Math.min(rows.length-1,Math.floor((y-y0)/(y1-y0)*rows.length))]);
  // reflets horizontaux
  for(let i=0;i<46;i++){const x=Math.floor(rnd()*LW),y=y0+1+Math.floor(rnd()*(y1-y0-2)),w=2+Math.floor(rnd()*5);
    rectW(ctx,x,y,w,1,rnd()<0.4?"#7ab0e8":"#6aa0e0");}
  // lueur horizon centrale
  for(let dx=-30;dx<=30;dx++)for(let dy=0;dy<3;dy++)if(Math.abs(dx)<30-dy*8&&(dx+dy)%2===0)P(ctx,120+dx,y0+dy,"#cfe8f8");
  for(let i=0;i<14;i++)P(ctx,Math.floor(rnd()*LW),y0+Math.floor(rnd()*(y1-y0)),"#e8f4ff"); // scintillements
}
function seededRnd(k){let seed=k.split("").reduce((a,c)=>a*31+c.charCodeAt(0),7)>>>0;
  return()=>{seed=(seed*1103515245+12345)>>>0;return(seed%10000)/10000;};}

            if(tg){const h=Math.max(1,Math.floor(tg.maxHp*fx.healAlly/100));tg.hp=Math.min(tg.maxHp,tg.hp+h);
              gs.floats.push({id:gs.fid++,text:`${frn(mvN)} +${h}`,c:"#78C850",side:isTeamSide?"team":"enemy",ttl:1000});

          if(fx.sUp){modStep(user,fx.sUp[0],false);gs.floats.push({id:gs.fid++,text:`${frn(mvN)} ▲`,c:"#7ec8e3",side:isTeamSide?"team":"enemy",ttl:900});blog(gs,`🔺 ${uName} → ${frn(mvN)} : ${STAT_FR[fx.sUp[0]]} augmente`);return;}
          const tgt0=targets[0];if(!tgt0)return;
          if(fx.slp){if(tryStatus(tgt0,"slp")){gs.floats.push({id:gs.fid++,text:`💤 Endormi !`,c:STATUS_BADGE.slp[1],side:sideT,ttl:1100});blog(gs,`💤 ${uName} → ${frn(mvN)} : ${DEX[tgt0.sp].name} s'endort !`);}else blog(gs,`${uName} → ${frn(mvN)} : sans effet (déjà affecté).`);return;}
          if(fx.tDn){if(Math.random()*100<fx.tDn[1]){modStep(tgt0,fx.tDn[0],true);gs.floats.push({id:gs.fid++,text:`${frn(mvN)} ▼`,c:"#c0a8ff",side:sideT,ttl:900});blog(gs,`🔻 ${uName} → ${frn(mvN)} : ${STAT_FR[fx.tDn[0]]} de ${DEX[tgt0.sp].name} baisse`);}return;}
          return;
        }
        // Attaque offensive
        const hitOne=(tgt,mult)=>{
          const ts=isTeamSide?tgt.stats:calcStats(tgt); // ennemis: stats précalc; équipe cible: calc
          const tStats=isTeamSide?tgt.stats:calcStats(tgt);
          const raw=dmgCalc(user,mvN,tgt,tStats,userStats);
          let dmg=Math.max(1,Math.floor(raw.dmg*mult*(isTeamSide?(1+gs.medals.atk*0.02):(1-gs.medals.def*0.015))));
          tgt.hp=Math.max(0,tgt.hp-dmg);
          const effTxt=raw.eff>=2?" — SUPER EFFICACE ✨":raw.eff===0?" — aucun effet ∅":raw.eff<1?" — peu efficace ▽":"";
          gs.floats.push({id:gs.fid++,text:`${frn(mvN)} -${dmg}${raw.eff>1?" ✨":raw.eff<1?" ▽":""}`,c:isTeamSide?TC[ty]:"#ff6b6b",side:sideT,ttl:1000});
          blog(gs,`${isTeamSide?"⚔️":"🛡️"} ${uName} → ${frn(mvN)} : −${dmg} PV sur ${DEX[tgt.sp].name}${effTxt}`);
          // effets secondaires
          if(fx.drain){const h=Math.max(1,Math.floor(dmg*fx.drain/100));user.hp=Math.min(user.maxHp,user.hp+h);gs.floats.push({id:gs.fid++,text:`+${h} 🩸`,c:"#78C850",side:isTeamSide?"team":"enemy",ttl:900});}
          if(fx.brn&&Math.random()*100<fx.brn&&tryStatus(tgt,"brn"))blog(gs,`🔥 ${DEX[tgt.sp].name} est BRÛLÉ !`);
          if(fx.par&&Math.random()*100<fx.par&&tryStatus(tgt,"par"))blog(gs,`⚡ ${DEX[tgt.sp].name} est PARALYSÉ !`);
          if(fx.frz&&Math.random()*100<fx.frz&&tryStatus(tgt,"frz"))blog(gs,`❄️ ${DEX[tgt.sp].name} est GELÉ !`);
          if(fx.psn&&Math.random()*100<fx.psn&&tryStatus(tgt,"psn"))blog(gs,`☠️ ${DEX[tgt.sp].name} est EMPOISONNÉ !`);
          if(fx.tDn&&Math.random()*100<fx.tDn[1]){modStep(tgt,fx.tDn[0],true);blog(gs,`🔻 ${STAT_FR[fx.tDn[0]]} de ${DEX[tgt.sp].name} baisse`);}
          if(fx.steal&&isTeamSide&&!user.item&&tgt.item){user.item=tgt.item;tgt.item=null;blog(gs,`🕵️ ${uName} VOLE ${HELD[user.item].name} !`);gs.life.steals=(gs.life.steals||0)+1;}
          if(tgt.hp===0){
            if(isTeamSide)onEnemyDead(gs,tgt);
            else{blog(gs,`💀 ${DEX[tgt.sp].name} est K.O. !`);playCry(tgt.sp,gs.vol);}
          }
          return dmg;
        };
        let total=0;
        if(fx.aoe){
          const list=targets.filter(t=>t.hp>0);
          gs.floats.push({id:gs.fid++,text:TYPE_EMOJI[ty],side:sideT,big:true,ttl:600});
          for(const t of list)total+=hitOne(t,0.75);
        }else{
          const tgt=targets.find(t=>t.hp>0);if(!tgt)return;
          gs.floats.push({id:gs.fid++,text:TYPE_EMOJI[ty],side:sideT,big:true,ttl:600});
          total=hitOne(tgt,1);

        if(fx.recoil&&total>0){const rc=Math.max(1,Math.floor(total*fx.recoil/100));user.hp=Math.max(0,user.hp-rc);gs.floats.push({id:gs.fid++,text:`recul -${rc}`,c:"#e67946",side:isTeamSide?"team":"enemy",ttl:900});if(user.hp===0)blog(gs,`💥 ${uName} tombe K.O. de son recul !`);}
        if(fx.selfKO){user.hp=0;blog(gs,`💥 ${uName} explose et tombe K.O. !`);}
        if(fx.sDn){modStep(user,fx.sDn[0],true);}
      };

      // ── Peut agir ? (paralysie / gel / sommeil) ──
      const canAct=(e)=>{
        if(e.status==="frz"||e.status==="slp")return false;
        if(e.status==="par"&&Math.random()<0.20){blog(gs,`⚡ ${DEX[e.sp].name} est paralysé, il ne peut pas attaquer !`);return false;}
        return true;
      };

      // ── Attaques ennemies (le tank/1er vivant encaisse les coups directs) ──
      const isLeaderFight=gs.trainerFight&&ROUTES[gs.route].tr.gym&&gs.gymIdx===cityTrainers(ROUTES[gs.route]).length-1;
      for(const en of gs.enemies){
        if(en.hp<=0)continue;
        en.atkCd-=TICK;
        if(en.atkCd>0)continue;
        const eMoves=learnedAt(en.sp,en.lv).slice(-4);
        const front=gs.team.find(m2=>m2.hp>0);
        if(!front)break;
        let mvN;
        if(isLeaderFight){
          let best=null,bv=-1;
          for(const cand of eMoves){const md=MV[cand];if(!md)continue;
            const fd=DEX[front.sp];
            const v=md[0]>0?md[0]*tEff(md[1],fd.t1,fd.t2)*((md[1]===DEX[en.sp].t1||md[1]===DEX[en.sp].t2)?1.5:1)*(md[4]<999?md[4]/100:1):(en.hp<en.maxHp*0.4&&(md[5]||{}).healSelf?999:8);
            if(v>bv){bv=v;best=cand;}}
          mvN=best||eMoves[0];
        }else{
          en.mvIdx=Number.isInteger(en.mvIdx)?en.mvIdx%eMoves.length:0;
          mvN=eMoves[en.mvIdx];en.mvIdx=(en.mvIdx+1)%eMoves.length;
        }
        const parMult=en.status==="par"?1.5:1;
        en.atkCd=Math.floor((actionItv(en.stats.spe*((en.mod||{}).spe||1),mvN)+400)*parMult);en.actMax=en.atkCd;
        if(!canAct(en)){dirty=true;continue;}
        // cibles : coups directs → [tank] ; AOE → toute l'équipe vivante
        applyMove(en,mvN,en.stats,(MV[mvN][5]||{}).aoe?gs.team.filter(x=>x.hp>0):[front],false);
        dirty=true;
      }

      // ── Attaques de l'équipe ──
      for(const m of alive){
        if(m.hp<=0)continue;
        const ms=calcStats(m);
        m.actCd-=TICK;
        if(m.actCd>0)continue;
        if(!m.moves.length){m.actCd=2000;continue;}
        m.mvIdx=Number.isInteger(m.mvIdx)?m.mvIdx%m.moves.length:0;
        const mvN=m.moves[m.mvIdx];
        m.lastIdx=m.mvIdx;
        m.mvIdx=(m.mvIdx+1)%m.moves.length;
        const medSpd=1-(gs.medals?.spd||0)*0.01;
        const parMult=m.status==="par"?1.5:1;
        m.actCd=Math.floor(actionItv(ms.spe*((m.mod||{}).spe||1),mvN)*medSpd*parMult);m.actMax=m.actCd;
        if(!MV[mvN])continue;
        if(!canAct(m)){dirty=true;continue;}
        const aliveEn=gs.enemies.filter(e=>e.hp>0);
        if(!aliveEn.length)break;
        applyMove(m,mvN,ms,aliveEn,true);
        dirty=true;
      }

      // Vague terminée ?
      if(gs.enemies.length>0&&gs.enemies.every(e=>e.hp<=0)){
        const r=ROUTES[gs.route];
        gs.team.forEach(m=>{m.mod={};}); // fin de vague : reset des modificateurs
        if(gs.trainerFight){
          gs.trIdx++;
          const t=curTrainer(gs);
          if(gs.trIdx>=t.team.length){
            const list=cityTrainers(r);
            if(r.tr.gym&&gs.gymIdx<list.length-1){
              // dresseur intermédiaire d'arène vaincu
              gs.money+=Math.floor(t.cash/2);
              gs.log.unshift(`🏆 ${t.name} vaincu ! +${Math.floor(t.cash/2)}₽`);
              gs.gymIdx++;gs.trIdx=0;
              gs.team.forEach(m=>{m.hp=Math.min(m.maxHp,m.hp+Math.floor(m.maxHp*0.4));});
              gs.enemies=[mkTrainerMon(gs)];
            }else onTrainerDefeated(gs,r);
          }
          else gs.enemies=[mkTrainerMon(gs)];
        }else{
          gs.wave++;
          if(gs.wave>=(gs.route===0?6:WAVES)){gs.trainerFight=true;gs.trIdx=0;gs.enemies=[mkTrainerMon(gs)];gs.log.unshift(`⚔️ ${r.tr.name} te défie !`);}
          else spawnWave(gs);
        }
        dirty=true;
      }
      gs.achT=(gs.achT||0)+TICK;
      if(gs.achT>=1000){gs.achT=0;
        for(const a of ACHS){if(!gs.ach[a.id]&&a.c(gs)){gs.ach[a.id]=Date.now();
          gs.log.unshift(`🏆 SUCCÈS débloqué : ${a.icon} ${a.name} !`);
          gs.floats.push({id:gs.fid++,text:`🏆 ${a.name} !`,c:"#ffd166",side:"team",ttl:2600});dirty=true;}}
      }
      if(gs.evoQueue&&gs.evoQueue.length&&!gs.evoShowing){gs.evoShowing=true;setEvo(gs.evoQueue.shift());}
      if(dirty||gs.floats.length)rr();
    },TICK);
    return()=>clearInterval(iv);
  },[]);

  function onEnemyDead(gs,en){
    gs.kills++;gs.life.kills++;playCry(en.sp,gs.vol);
    // ₽ très réduits — il faut farmer
    const base=Math.max(1,Math.ceil(en.lv*(gs.trainerFight?1.6:0.5)));
    const cash=Math.floor(base*(gs.items.amulet?1.5:1)*(1+gs.medals.gold*0.03));
    gs.money+=cash;gs.life.money+=cash;
    let xpMult=(gs.items.expshare?1.5:1)*(1+gs.medals.xp*0.03);
    // XP très réduite (÷~3 encore) — courbe cubique lente
    const DXP=[1.5,1,0.85,0.7][gs.diff];
    const xpGain=Math.max(1,Math.floor(en.lv*2.2*DXP*xpMult*(gs.trainerFight?2:1)*(gs.route===0?5:1)));
    gs.floats.push({id:gs.fid++,text:`+${cash}₽`,c:"#ffd166",side:"enemy",ttl:1200});
    if(gs.team.some(m=>m.hp>0&&m.abi==="Ramassage")){
      if(Math.random()<0.25){
        const bonus=Math.max(1,Math.floor(cash*0.5));gs.money+=bonus;
        gs.floats.push({id:gs.fid++,text:`😺 +${bonus}₽`,c:"#ffd166",side:"enemy",ttl:1400});
      }
      if(en.item&&Math.random()<0.2){
        gs.heldInv.push(en.item);
        gs.log.unshift(`😺 Ramassage récupère ${HELD[en.item].name} !`);
        gs.floats.push({id:gs.fid++,text:`😺 ${HELD[en.item].name} !`,c:"#9c88ff",side:"enemy",ttl:1800});
        en.item=null;
      }
    }
    // Pension : l'œuf progresse à chaque victoire sauvage
    if(!gs.trainerFight&&gs.pension.a&&gs.pension.b){
      gs.pension.prog++;
      if(gs.pension.prog>=gs.pension.need){
        gs.pension.prog=0;
        const pa=[...gs.team,...gs.box].find(x=>x.uid===gs.pension.a);
        const pb=[...gs.team,...gs.box].find(x=>x.uid===gs.pension.b);
        if(pa&&pb){
          const src=(pa.sp===132?pb:pa);
          const baby=mkMon(baseEvo(src.sp),5,(gs.items.shinycharm?3:1)*6);
          // hérite des 3 meilleures IV parmi les parents (3 stats aléatoires)
          const stats=["hp","atk","def","spa","spd","spe"].sort(()=>Math.random()-0.5).slice(0,3);
          stats.forEach(k=>{baby.iv[k]=Math.max(pa.iv[k],pb.iv[k]);});
          const bs=calcStats(baby);baby.maxHp=bs.hp;baby.hp=bs.hp;
          gs.box.push(baby);gs.eggs++;gs.life.eggs++;gs.life.pension++;
          gs.dex[baby.sp]=gs.dex[baby.sp]||{seen:0,caught:0};gs.dex[baby.sp].seen++;gs.dex[baby.sp].caught++;
          if(baby.shiny){gs.shinies++;gs.life.shinies++;gs.dex[baby.sp].shiny=(gs.dex[baby.sp].shiny||0)+1;gs.log.unshift("✨✨ L'ŒUF DE LA PENSION ÉTAIT SHINY !! ✨✨");}
          gs.log.unshift(`🥚 Pension : ${DEX[baby.sp].name} éclot (IV héritées : ${stats.map(k=>STAT_FR[k]).join(", ")}) !`);
        }
      }
    }
    const evStat=evYield(en.sp);
    gs.team.forEach(m=>{
      if(m.hp<=0)return;
      const tot=Object.values(m.ev).reduce((a,b)=>a+b,0);
      if(m.ev[evStat]<252&&tot<510)m.ev[evStat]=Math.min(252,m.ev[evStat]+2);
      m.xp+=Math.floor(xpGain*(m.item==="luckyegg"?2:1));
      while(m.xp>=xpFor(m.lv+1)&&m.lv<100){
        m.lv++;if(m.lv>gs.life.maxLv)gs.life.maxLv=m.lv;
        // apprentissage officiel par niveau
        LEARN[m.sp].filter(([l])=>l===m.lv).forEach(([,mvN])=>{
          if(m.moves.includes(mvN))return;
          if(m.moves.length<4){m.moves.push(mvN);gs.log.unshift(`📖 ${DEX[m.sp].name} apprend ${frn(mvN)} !`);}
          else gs.log.unshift(`📖 ${DEX[m.sp].name} peut apprendre ${frn(mvN)} (via sa fiche) !`);
        });
        const ns=calcStats(m);const gain=ns.hp-m.maxHp;m.maxHp=ns.hp;m.hp=Math.min(ns.hp,m.hp+gain);
        gs.floats.push({id:gs.fid++,text:`⬆ ${DEX[m.sp].name} Niv.${m.lv}`,c:"#7ec8e3",side:"team",ttl:1800});
        const d=DEX[m.sp];
        if(d.evoLv>0&&m.lv>=d.evoLv&&d.evoTo&&DEX[d.evoTo]){
          const oldSp=m.sp;m.sp=d.evoTo;
          const nd=DEX[m.sp];
          const ns2=calcStats(m);m.maxHp=ns2.hp;m.hp=ns2.hp;m.actCd=0;m.mvIdx=0;
          gs.dex[m.sp]=gs.dex[m.sp]||{seen:0,caught:0};gs.dex[m.sp].seen++;gs.dex[m.sp].caught++;
          gs.log.unshift(`🌟 ${DEX[oldSp].name} évolue en ${nd.name} !`);
          gs.evoQueue=gs.evoQueue||[];gs.evoQueue.push({from:oldSp,to:m.sp,shiny:m.shiny});gs.life.evos++;
        }
      }
    });
    if(en.shiny){gs.shinies++;gs.life.shinies++;}
  }
  function onTrainerDefeated(gs,r){

    gs.log.unshift(`🏆 ${r.tr.name} vaincu ! +${Math.floor(r.tr.cash/3)}₽`);
    if(r.tr.badge&&!gs.badges.includes(r.tr.badge)){gs.badges.push(r.tr.badge);gs.log.unshift(`🎖️ ${r.tr.badge} obtenu !`);}
    if(r.tr.tm&&!gs.tms.includes(r.tr.tm)){gs.tms.push(r.tr.tm);gs.log.unshift(`💿 CT obtenue : ${frn(r.tr.tm)} !`);}
    const eggChance=gs.route===0?1:Math.min(0.9,0.35+gs.medals.egg*0.04);

      const egg=mkMon(eid,scaleLv(Math.max(5,r.lv[0]),gs.diff),(gs.items.shinycharm?3:1)*6);
      egg.iv.hp=16+Math.floor(Math.random()*16);egg.iv.atk=16+Math.floor(Math.random()*16);
      const es=calcStats(egg);egg.maxHp=es.hp;egg.hp=es.hp;
      gs.eggs++;
      gs.dex[eid]=gs.dex[eid]||{seen:0,caught:0};gs.dex[eid].seen++;gs.dex[eid].caught++;
      if(egg.shiny){gs.shinies++;gs.life.shinies++;gs.dex[eid].shiny=(gs.dex[eid].shiny||0)+1;gs.log.unshift(`✨✨ L'ŒUF ÉTAIT SHINY !! ✨✨`);}
      if(gs.team.length<3){gs.team.push(egg);gs.log.unshift(`🥚 Œuf éclos : ${DEX[eid].name} rejoint l'équipe !`);}
      else{gs.box.push(egg);gs.log.unshift(`🥚 Œuf éclos : ${DEX[eid].name} envoyé au PC !`);}
    }else if(!r.tr.gym)gs.log.unshift(`…pas d'œuf cette fois. Rebats-le pour retenter (35%) !`);
    // FIN D'ACTE → difficulté supérieure
    if(r.tr.final){
      // Master Ball : capture de Mewtwo !
      if(gs.items.masterball&&!gs.mbUsed[gs.diff]){
        delete gs.items.masterball;gs.mbUsed[gs.diff]=true;
        const mew=mkMon(150,scaleLv(70,gs.diff));
        const msx=calcStats(mew);mew.maxHp=msx.hp;mew.hp=msx.hp;
        gs.box.push(mew);

        if(mew.shiny){gs.dex[150].shiny=(gs.dex[150].shiny||0)+1;}

      }
      if(gs.diff+1>gs.diffMax)gs.diffMax=Math.min(DIFFS.length-1,gs.diff+1);
      if(gs.diff<DIFFS.length-1){
        gs.diff++;
        gs.route=0;gs.maxRoute=0;gs.gymIdx=0;
        gs.log.unshift(`🔥🔥 ACTE I TERMINÉ ! Difficulté ${DIFFS[gs.diff].name} — niveaux ${DIFFS[gs.diff].lo}-${DIFFS[gs.diff].hi} !`);
      }else gs.log.unshift(`👑 TOURMENT TERMINÉ. Tu es le Maître absolu de Kanto !`);
      gs.wave=0;gs.trainerFight=false;gs.trIdx=0;gs.gymIdx=0;
      gs.team.forEach(m=>{m.hp=m.maxHp;m.mod={};m.status=null;});
      spawnWave(gs);return;
    }
    const justUnlocked=(gs.route===gs.maxRoute&&gs.maxRoute<ROUTES.length-1);
    if(justUnlocked)gs.maxRoute++;
    // Auto-avance SEULEMENT vers une route fraîchement débloquée (sinon on farme ici)
    if(justUnlocked){
      gs.route++;
      gs.log.unshift(`➡️ Nouvelle zone : ${ROUTES[gs.route].name} !`);

    if(nr.tr.gym||nr.solo){gs.trainerFight=true;gs.enemies=[mkTrainerMon(gs)];gs.log.unshift(`🏛️ ${nr.name} — l'arène t'attend !`);}
    else spawnWave(gs);
  }

  const gs=g.current;const r=ROUTES[gs.route];

  // ── SAUVEGARDE AUTO + OFFLINE ──
  const serialize=()=>{

    return JSON.stringify({v:2,ts:Date.now(),money:gs2.money,route:gs2.route,maxRoute:gs2.maxRoute,badges:gs2.badges,items:gs2.items,tms:gs2.tms,diff:gs2.diff,diffMax:gs2.diffMax,medals:gs2.medals,life:gs2.life,ach:gs2.ach,vol:gs2.vol,mbUsed:gs2.mbUsed,dex:gs2.dex,kills:gs2.kills,eggs:gs2.eggs,shinies:gs2.shinies,heldInv:gs2.heldInv,

      box:gs2.box.map(m=>({sp:m.sp,lv:m.lv,xp:m.xp,iv:m.iv,ev:m.ev,nature:m.nature,abi:m.abi,shiny:m.shiny,gender:m.gender,moves:m.moves,item:m.item}))});
  };
  const reviveMon=(o)=>{const m=mkMon(o.sp,o.lv);Object.assign(m,o);const st=calcStats(m);m.maxHp=st.hp;m.hp=st.hp;m.actCd=0;m.mvIdx=0;m.mod={};m.status=null;return m;};
  const loadSave=(txt)=>{
    try{
      const sv=JSON.parse(txt);if(!sv.team)throw 0;
      const gs2=g.current;
      Object.assign(gs2,{money:sv.money||0,route:sv.route||0,maxRoute:sv.maxRoute||0,badges:sv.badges||[],items:sv.items||{},tms:sv.tms||[],diff:sv.diff||0,medals:Object.assign({atk:0,def:0,gold:0,xp:0,spd:0,egg:0},sv.medals||{}),life:Object.assign({kills:0,eggs:0,shinies:0,evos:0,steals:0,money:0,maxLv:5,pension:0},sv.life||{}),ach:sv.ach||{},vol:sv.vol??0.5,diffMax:sv.diffMax||sv.diff||0,mbUsed:sv.mbUsed||{},dex:sv.dex||{},kills:sv.kills||0,eggs:sv.eggs||0,shinies:sv.shinies||0,heldInv:sv.heldInv||[]});
      gs2.team=(sv.team||[]).map(reviveMon);gs2.box=(sv.box||[]).map(reviveMon);
      gs2.enemies=[];gs2.trainerFight=false;gs2.wave=0;gs2.trIdx=0;gs2.gymIdx=0;

      if(sv.ts&&gs2.team.length&&gs2.route>0){
        const away=Math.min(8*3600,(Date.now()-sv.ts)/1000);
        if(away>60){
          const r=ROUTES[gs2.route];
          if(!r.tr.gym&&!r.solo){
            const avgLv=scaleLv((r.lv[0]+r.lv[1])/2,gs2.diff);

            const xpOff=Math.floor(killsOff*avgLv*1.1*0.6); // rendement offline 60%
            const cashOff=Math.floor(killsOff*avgLv*0.5*0.6);
            gs2.money+=cashOff;gs2.kills+=killsOff;
            gs2.team.forEach(m=>{
              m.xp+=Math.floor(xpOff*(m.item==="luckyegg"?2:1)*(gs2.items.expshare?1.5:1));
              while(m.xp>=xpFor(m.lv+1)&&m.lv<100){m.lv++;
                LEARN[m.sp].filter(([l])=>l===m.lv).forEach(([,mvN])=>{if(!m.moves.includes(mvN)&&m.moves.length<4)m.moves.push(mvN);});

                if(d.evoLv>0&&m.lv>=d.evoLv&&d.evoTo&&DEX[d.evoTo]){m.sp=d.evoTo;gs2.dex[m.sp]=gs2.dex[m.sp]||{seen:0,caught:0};gs2.dex[m.sp].seen++;gs2.dex[m.sp].caught++;}
              }
              const st=calcStats(m);m.maxHp=st.hp;m.hp=st.hp;
            });
            gs2.log.unshift(`🌙 Pendant ton absence (${Math.floor(away/60)} min) : ${killsOff} Pokémon vaincus, +${cashOff}₽ !`);
          }
        }
      }
      rr();return true;
    }catch(e){return false;}

      if(pa.gender===pb.gender)return{ok:false,why:"Genres opposés requis (♂ + ♀), ou utilise Métamorph."};
    }
    return{ok:true,why:""};
  })();

    `}</style>

    {/* HEADER */}

              <div style={{display:"grid",gridTemplateColumns:"30px 26px 1fr",gap:3,alignItems:"center",fontSize:6,marginBottom:8}}>
                {BSL.map(([k,l])=>(<React.Fragment key={k}>
                  <span style={{color:"#ddd"}}>{l}</span><span style={{color:"#fff"}}>{d.bs[k]}</span>
                  <div style={{background:"#222",height:5,borderRadius:2}}><div style={{width:`${Math.min(100,(d.bs[k]/160)*100)}%`,height:"100%",borderRadius:2,background:d.bs[k]>=100?"#4caf50":d.bs[k]>=70?"#ffd166":"#e67946"}}/></div>
                </React.Fragment>))}
              </div>
              <div style={{fontSize:7,color:"#ffd166",marginBottom:4}}>🧬 Évolutions</div>
              <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap",marginBottom:8}}>
                {chain.map((id2,i)=>(<React.Fragment key={id2}>
                  {i>0&&<span style={{fontSize:6,color:"#888"}}>→N.{DEX[chain[i-1]].evoLv||"?"}→</span>}
                  <div onClick={()=>gs.dex[id2]&&setDexSel(id2)} style={{textAlign:"center",opacity:gs.dex[id2]?1:.3,cursor:"pointer",position:"relative"}}>
                    {gs.dex[id2]?.caught>0&&<div style={{position:"absolute",top:-4,right:-2}}><Pokeball size={10}/></div>}
                    <Sprite sp={id2} size={40}/><div style={{fontSize:5,color:id2===dexSel?"#4a90d9":"#aaa"}}>{DEX[id2].name}</div>
                  </div>
                </React.Fragment>))}
              </div>
              <div style={{fontSize:7,color:"#ffd166",marginBottom:4}}>📖 Attaques apprises</div>
              <div style={{marginBottom:8}}>
                {LEARN[dexSel].map(([l,mv],i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:6,padding:"2px 0",borderBottom:"1px solid #1c1c38",cursor:"pointer"}} onClick={()=>setInfo({title:frn(mv),type:MV[mv][1],body:mvDesc(mv)})}>
                  <span style={{color:"#888",width:26}}>N.{l}</span>
                  <TypeIcon t={MV[mv][1]} size={13}/>
                  <span style={{color:"#ddd",flex:1,textDecoration:"underline"}}>{frn(mv)}</span>
                  <span style={{color:"#666"}}>{MV[mv][0]>0?`Puis.${MV[mv][0]}`:"Statut"}</span>
                </div>))}
              </div>
              <div style={{fontSize:7,color:"#ffd166",marginBottom:4}}>🗺️ Habitat (rencontres sauvages)</div>
              {routes.length===0&&<div style={{fontSize:6,color:"#555"}}>Introuvable à l'état sauvage (évolution ou œuf uniquement).</div>}
              {routes.map(rt=>(<div key={rt.name} style={{fontSize:6,color:ROUTES.indexOf(rt)<=gs.maxRoute?"#4caf50":"#666",padding:"1px 0"}}>
                {ROUTES.indexOf(rt)<=gs.maxRoute?"✓":"🔒"} {rt.name} (Niv.~{scaleLv(rt.lv[0],gs.diff)}-{scaleLv(rt.lv[1],gs.diff)})
              </div>))}
              {eggR.length>0&&<div style={{fontSize:5,color:"#888",marginTop:4}}>🥚 Peut éclore des œufs de : {eggR.map(rt=>rt.name).join(", ")}</div>}
            </div>
          </div>);})()}

    {/* ══ JOURNAL PLEIN ÉCRAN ══ */}
    {jFull&&(
      <div style={{position:"fixed",inset:0,background:"#000d",zIndex:65,display:"flex",alignItems:"center",justifyContent:"center",padding:12}} onClick={()=>setJFull(false)}>
        <div style={{background:"#12122a",border:"2px solid #4a90d9",borderRadius:10,padding:12,maxWidth:440,width:"100%",maxHeight:"85vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:9,color:"#fff",flex:1}}>📜 Journal de combat</div>
            <button className="bt btr" onClick={()=>setJFull(false)}>✕</button>
          </div>
          <div style={{fontSize:7,color:"#bcd",lineHeight:"14px",overflowY:"auto",flex:1}}>
            {(gs.blog||[]).map(e=><div key={e.id} style={{borderBottom:"1px solid #1c1c38",padding:"2px 0"}}>{e.t}</div>)}
          </div>
        </div>
      </div>
    )}

    {/* ══ SÉLECTEUR DE DIFFICULTÉ ══ */}
    {diffSel&&(
      <div style={{position:"fixed",inset:0,background:"#000d",zIndex:65,display:"flex",alignItems:"center",justifyContent:"center",padding:12}} onClick={()=>setDiffSel(false)}>
        <div style={{background:"#12122a",border:"2px solid #4a90d9",borderRadius:10,padding:12,maxWidth:320,width:"100%"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:9,color:"#fff",marginBottom:8}}>🔥 Difficulté</div>
          {DIFFS.map((d,i)=>{
            const locked=i>gs.diffMax;const cur=i===gs.diff;
            return(<div key={i} onClick={()=>{if(locked||cur)return;
                gs.diff=i;gs.route=0;gs.maxRoute=0;gs.wave=0;gs.trIdx=0;gs.gymIdx=0;gs.trainerFight=false;
                gs.team.forEach(m=>{m.hp=m.maxHp;m.actCd=0;m.mvIdx=0;m.mod={};m.status=null;});
                spawnWave(gs);gs.log.unshift(`🔥 Difficulté ${d.name} — niveaux ${d.lo}-${d.hi} !`);setDiffSel(false);rr();}}
              style={{display:"flex",alignItems:"center",gap:8,background:cur?"#1a2a1a":"#16162e",border:`1px solid ${cur?d.col:locked?"#333":"#2a2a4a"}`,borderRadius:6,padding:8,marginBottom:5,opacity:locked?.45:1,cursor:locked||cur?"default":"pointer"}}>
              <span style={{fontSize:9}}>{locked?"🔒":cur?"▶":"○"}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:8,color:d.col}}>{d.name}</div>
                <div style={{fontSize:5,color:"#888"}}>Ennemis Niv.{d.lo}-{d.hi}{locked?" — termine la difficulté précédente":""}</div>
              </div>
            </div>);})}
          <div style={{fontSize:5,color:"#666"}}>Changer de difficulté redémarre la progression des routes (équipe conservée).</div>
        </div>
      </div>
    )}

    {/* ══ CONFIRMATION NOUVELLE PARTIE ══ */}
    {confirmReset&&(
      <div style={{position:"fixed",inset:0,background:"#000d",zIndex:75,display:"flex",alignItems:"center",justifyContent:"center",padding:12}}>
        <div style={{background:"#12122a",border:"2px solid #e63946",borderRadius:10,padding:14,maxWidth:320,width:"100%",textAlign:"center"}}>
          <div style={{fontSize:9,color:"#e63946",marginBottom:8}}>⚠️ Nouvelle partie ?</div>
          <div style={{fontSize:6,color:"#ccc",lineHeight:"12px",marginBottom:10}}>Tu pourras choisir un nouveau starter.<br/><span style={{color:"#4caf50"}}>CONSERVÉS :</span> Succès, Pokédex (rencontres), statistiques à vie.<br/><span style={{color:"#e63946"}}>EFFACÉS :</span> équipe, PC, argent, objets, CT, badges, médailles, progression.</div>
          <div style={{display:"flex",gap:6,justifyContent:"center"}}>
            <button className="bt btr" onClick={()=>{
              const keep={dex:gs.dex,ach:gs.ach,life:gs.life};
              const fresh=initG();Object.assign(g.current,fresh,{dex:keep.dex,ach:keep.ach,life:keep.life});
              g.current.log.unshift("🔄 Nouvelle partie ! Choisis ton starter.");
              try{localStorage.setItem("taskbar-pokemon-save",serialize());}catch(e){}
              setConfirmReset(false);rr();
            }}>Oui, recommencer</button>
            <button className="bt" onClick={()=>setConfirmReset(false)}>Annuler</button>
          </div>
        </div>
      </div>
    )}

    {/* ══ ANIMATION D'ÉVOLUTION ══ */}
    {evo&&<EvoPopup evo={evo} onDone={()=>{g.current.evoShowing=false;setEvo(null);}}/>}

    {/* ══ POPUP INFO (attaques / talents / natures / CT) ══ */}
    {info&&(
      <div style={{position:"fixed",inset:0,background:"#000b",zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setInfo(null)}>
        <div style={{background:"#12122a",border:"2px solid #4a90d9",borderRadius:10,padding:14,maxWidth:340,width:"100%"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
            {info.type&&<TypeIcon t={info.type} size={16}/>}
            <div style={{fontSize:9,color:"#fff",flex:1}}>{info.title}</div>
            <button className="bt btr" onClick={()=>setInfo(null)}>✕</button>
          </div>
          <div style={{fontSize:7,color:"#ccc",lineHeight:"13px"}}>{info.body}</div>
          {info.extra&&<div style={{fontSize:6,color:"#8a94b8",lineHeight:"11px",marginTop:8,borderTop:"1px solid #2a2a4a",paddingTop:6}}>{info.extra}</div>}
        </div>
      </div>
    )}

    {/* ══ CONFIRMATION RELÂCHER ══ */}
    {confirmRel!==null&&(()=>{const m=gs.box.find(x=>x.uid===confirmRel);if(!m)return null;const d=DEX[m.sp];return(
      <div style={{position:"fixed",inset:0,background:"#000c",zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#12122a",border:"2px solid #e63946",borderRadius:10,padding:14,maxWidth:300,width:"100%",textAlign:"center"}}>
          <Sprite sp={m.sp} shiny={m.shiny} size={56}/>
          <div style={{fontSize:8,color:"#fff",margin:"6px 0"}}>Relâcher {m.shiny?"✨":""}{d.name} N.{m.lv} ?</div>
          <div style={{fontSize:6,color:"#e63946",marginBottom:10}}>⚠️ Il disparaîtra définitivement ! (+{m.lv*15}₽)</div>
          <div style={{display:"flex",gap:6,justifyContent:"center"}}>
            <button className="bt btr" onClick={()=>{releaseMon(m.uid);setConfirmRel(null);}}>Oui, relâcher</button>
            <button className="bt" onClick={()=>setConfirmRel(null)}>Annuler</button>
          </div>
        </div>
      </div>);})()}

    {/* ══ CHOIX DU STARTER ══ */}
    {gs.team.length===0&&(
      <div style={{position:"fixed",inset:0,background:"#0d0d1af2",zIndex:60,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:16}}>
        <div style={{fontSize:11,color:"#ffd166",textAlign:"center"}}>PROF. CHEN :</div>
        <div style={{fontSize:8,color:"#ddd",textAlign:"center",lineHeight:"14px"}}>« Choisis ton premier Pokémon ! »</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
          {[1,4,7].map(sp=>{const d=DEX[sp];return(
            <div key={sp} onClick={()=>chooseStarter(sp)} style={{background:"#16162e",border:`2px solid ${TC[d.t1]}`,borderRadius:10,padding:"14px 10px",textAlign:"center",cursor:"pointer",width:104}}>
              <Sprite sp={sp} size={64}/>
              <div style={{fontSize:8,color:"#fff",marginTop:6}}>{d.name}</div>
              <div style={{fontSize:6,marginTop:4}}>
                <span style={{background:TC[d.t1],color:"#fff",padding:"1px 5px",borderRadius:3}}>{TYPE_FR[d.t1]}</span>
                {d.t2&&<span style={{background:TC[d.t2],color:"#fff",padding:"1px 5px",borderRadius:3,marginLeft:2}}>{TYPE_FR[d.t2]}</span>}
              </div>
              <div style={{fontSize:5,color:"#888",marginTop:5,lineHeight:"9px"}}>{LEARN[sp].slice(0,3).map(([l,mv])=>`N.${l} ${frn(mv)}`).join(" · ")}</div>
            </div>);})}
        </div>
      </div>
    )}

    {/* ══ PAGE POKÉMON (modal) ══ */}
    {selMon!==null&&(()=>{
      const m=[...gs.team,...gs.box].find(x=>x.uid===selMon);
      if(!m)return null;
      const d=DEX[m.sp];const st=calcStats(m);
      const inTeam=gs.team.some(x=>x.uid===selMon);
      const nat=NAT[m.nature]||{};
      const natTxt=k=>nat[k]>1?" ▲":nat[k]<1?" ▼":"";
      const nextXp=xpFor(m.lv+1);
      const pool=movePool(m,gs.tms);
      const STATL=[["hp","PV"],["atk","ATK"],["def","DEF"],["spa","SpA"],["spd","SpD"],["spe","VIT"]];
      return(
      <div style={{position:"fixed",inset:0,background:"#000c",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:10}} onClick={()=>{setSelMon(null);setMvSlot(null);}}>
        <div style={{background:"#12122a",border:`2px solid ${m.shiny?"gold":"#4a90d9"}`,borderRadius:10,padding:12,maxWidth:400,width:"100%",maxHeight:"88vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
          {/* header */}
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
            <Sprite sp={m.sp} shiny={m.shiny} size={72}/>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:m.shiny?"gold":"#fff"}}>{m.shiny?"✨":""}{d.name} <span style={{color:"#888",fontSize:8}}>Niv.{m.lv}</span></div>
              <div style={{fontSize:7,marginTop:3}}>
                <span style={{background:TC[d.t1],color:"#fff",padding:"1px 5px",borderRadius:3,marginRight:3}}>{TYPE_FR[d.t1]}</span>
                {d.t2&&<span style={{background:TC[d.t2],color:"#fff",padding:"1px 5px",borderRadius:3}}>{TYPE_FR[d.t2]}</span>}
              </div>
              <div style={{fontSize:6,color:"#9c88ff",marginTop:3,cursor:"pointer",textDecoration:"underline"}} onClick={()=>setInfo({title:`Talent : ${m.abi}`,body:abiDesc(m.abi)})}>Talent : {m.abi} ⓘ</div>
              {m.gender&&<div style={{fontSize:7,color:m.gender==="♂"?"#6890F0":"#F85888"}}>{m.gender} {m.gender==="♂"?"Mâle":"Femelle"}</div>}
              <div style={{fontSize:6,color:"#aaa",cursor:"pointer",textDecoration:"underline"}} onClick={()=>setInfo({title:`Nature : ${NAT_FR[m.nature]||m.nature}`,body:natDesc(m.nature)})}>Nature : {NAT_FR[m.nature]||m.nature} ⓘ</div>
              {inTeam&&<div style={{fontSize:6,color:"#4caf50"}}>● En équipe</div>}
            </div>
            <button className="bt btr" onClick={()=>{setSelMon(null);setMvSlot(null);}}>✕</button>
          </div>
          {/* XP */}
          {(()=>{const cur=Math.max(0,m.xp-xpFor(m.lv));const need=Math.max(1,xpFor(m.lv+1)-xpFor(m.lv));return(<>
          <div style={{fontSize:6,color:"#4a90d9",marginBottom:2}}>EXP {cur.toLocaleString()} / {need.toLocaleString()} <span style={{color:"#666"}}>(niveau {m.lv}→{m.lv+1})</span></div>
          <div style={{background:"#222",height:5,borderRadius:2,marginBottom:8}}><div style={{width:`${Math.min(100,(cur/need)*100)}%`,height:"100%",background:"#4a90d9",borderRadius:2}}/></div>
          </>);})()}
          {pensionPick&&(gs.pension.a!==m.uid&&gs.pension.b!==m.uid)&&(
            <button className="bt btg" style={{width:"100%",padding:7,marginBottom:8,fontSize:7}}
              onClick={()=>{setPension(pensionPick,m.uid);setPensionPick(null);setSelMon(null);}}>
              🏠 Mettre en Pension — Parent {pensionPick.toUpperCase()}
            </button>
          )}
          {/* stats + IV/EV */}
          <div style={{fontSize:7,color:"#ffd166",marginBottom:4}}>📊 Statistiques</div>
          <div style={{display:"grid",gridTemplateColumns:"34px 34px 1fr 46px 40px",gap:3,alignItems:"center",fontSize:6,marginBottom:8}}>
            <span style={{color:"#666"}}>Stat</span><span style={{color:"#666"}}>Val.</span><span style={{color:"#666"}}>IV</span><span style={{color:"#666"}}>IV/31</span><span style={{color:"#666"}}>EV</span>
            {STATL.map(([k,l])=>(<React.Fragment key={k}>
              <span style={{color:"#ddd"}}>{l}{natTxt(k)}</span>
              <span style={{color:"#fff"}}>{k==="hp"?`${m.hp}/${st.hp}`:st[k]}</span>
              <div style={{background:"#222",height:5,borderRadius:2}}><div style={{width:`${(m.iv[k]/31)*100}%`,height:"100%",borderRadius:2,background:m.iv[k]>25?"#4caf50":m.iv[k]>15?"#ffd166":"#e63946"}}/></div>
              <span style={{color:m.iv[k]>25?"#4caf50":"#aaa"}}>{m.iv[k]}/31</span>
              <span style={{color:m.ev[k]>0?"#7ec8e3":"#555"}}>{m.ev[k]}</span>
            </React.Fragment>))}
          </div>
          <div style={{fontSize:5,color:"#666",marginBottom:8}}>Total IV : {Object.values(m.iv).reduce((a,b)=>a+b,0)}/186 · Total EV : {Object.values(m.ev).reduce((a,b)=>a+b,0)}/510 · ▲▼ = nature</div>
          {(()=>{
            const weak=[],res=[],imm=[];
            Object.keys(TC).forEach(T=>{const mult=tEff(T,d.t1,d.t2);
              if(mult>=2)weak.push([T,mult]);else if(mult===0)imm.push(T);else if(mult<1)res.push([T,mult]);});
            const chip=(T,x)=>(<span key={T} style={{background:TC[T],color:"#fff",fontSize:5,padding:"1px 4px",borderRadius:3,marginRight:2,marginBottom:2,display:"inline-block"}}>{TYPE_FR[T]}{x?` ×${x}`:""}</span>);
            return(<div style={{marginBottom:8}}>
              <div style={{fontSize:7,color:"#ffd166",marginBottom:3}}>⚖️ Table des types</div>
              <div style={{fontSize:5,color:"#e63946",marginBottom:2}}>Faiblesses : {weak.length?weak.map(([T,x])=>chip(T,x)):"aucune"}</div>
              <div style={{fontSize:5,color:"#4caf50",marginBottom:2}}>Résistances : {res.length?res.map(([T,x])=>chip(T,x)):"aucune"}</div>
              {imm.length>0&&<div style={{fontSize:5,color:"#8a94b8"}}>Immunités : {imm.map(T=>chip(T,0))}</div>}
            </div>);})()}
          {/* Objet tenu */}
          <div style={{fontSize:7,color:"#ffd166",marginBottom:4}}>🎒 Objet tenu</div>
          {m.item?(
            <div style={{display:"flex",alignItems:"center",gap:6,background:"#1a1a34",border:"1px solid #9c88ff",borderRadius:5,padding:6,marginBottom:6}}>
              <div style={{flex:1}}><div style={{fontSize:7,color:"#9c88ff"}}>{HELD[m.item].name}</div><div style={{fontSize:5,color:"#888"}}>{HELD[m.item].desc}</div></div>
              <button className="bt btr" onClick={()=>unequipHeld(m.uid)}>Retirer</button>
            </div>
          ):<div style={{fontSize:6,color:"#555",marginBottom:6}}>Aucun objet tenu.</div>}
          {gs.heldInv.length>0&&<div style={{marginBottom:8}}>
            <div style={{fontSize:5,color:"#888",marginBottom:3}}>Inventaire ({gs.heldInv.length}) — toucher pour équiper :</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {gs.heldInv.map((hid,i)=>(<button key={i} className="bt" onClick={()=>equipHeld(m.uid,hid)} title={HELD[hid].desc}>{HELD[hid].name}</button>))}
            </div>
          </div>}
          {/* Attaques — s'enchaînent dans l'ORDRE, cadence liée à la Vitesse */}
          <div style={{fontSize:7,color:"#ffd166",marginBottom:2}}>⚔️ Attaques (ordre d'enchaînement)</div>
          <div style={{fontSize:5,color:"#888",marginBottom:4}}>Elles se déclenchent l'une après l'autre, de haut en bas. ▲▼ pour réordonner · nom pour les détails · ⇄ pour remplacer.</div>
          {m.moves.map((mv,i)=>{
            const md=MV[mv]||[0,"Normal",2500];
            const isNext=i===(m.mvIdx%m.moves.length);
            const chg=isNext&&m.actMax?Math.max(0,Math.min(1,1-(m.actCd/m.actMax))):0;
            return(
            <div key={i} style={{position:"relative",overflow:"hidden",display:"flex",alignItems:"center",gap:5,background:"#1a1a34",border:`1px solid ${isNext?"#ffd166":TC[md[1]]+"66"}`,borderRadius:5,padding:"4px 6px",marginBottom:3}}>
              {isNext&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:`${chg*100}%`,background:"#ffd16622",pointerEvents:"none"}}/>}
              <span style={{fontSize:6,color:isNext?"#ffd166":"#666",width:10}}>{isNext?"▶":`${i+1}.`}</span>
              <TypeIcon t={md[1]} size={13}/>
              <span style={{fontSize:7,color:"#fff",flex:1,cursor:"pointer",textDecoration:"underline"}} onClick={()=>setInfo({title:frn(mv),type:md[1],body:mvDesc(mv)})}>{frn(mv)}</span>
              <span style={{fontSize:5,color:"#aaa"}}>{md[0]>0?`P.${md[0]}`:"St"}</span>
              <button className="bt" style={{padding:"2px 4px"}} disabled={i===0} onClick={()=>{if(i>0){[m.moves[i-1],m.moves[i]]=[m.moves[i],m.moves[i-1]];m.mvIdx=0;rr();}}}>▲</button>
              <button className="bt" style={{padding:"2px 4px"}} disabled={i===m.moves.length-1} onClick={()=>{if(i<m.moves.length-1){[m.moves[i+1],m.moves[i]]=[m.moves[i],m.moves[i+1]];m.mvIdx=0;rr();}}}>▼</button>
              <button className="bt btg" style={{padding:"2px 4px"}} onClick={()=>setMvSlot(mvSlot===i?null:i)}>⇄</button>
            </div>);})}
          {mvSlot!==null&&<div style={{background:"#0d0d20",border:"1px solid #4caf50",borderRadius:5,padding:6,marginTop:4}}>
            <div style={{fontSize:5,color:"#4caf50",marginBottom:4}}>{mvSlot<m.moves.length?`Remplacer ${frn(m.moves[mvSlot])} par :`:"Apprendre :"}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {pool.filter(p=>!m.moves.includes(p)).map(p=>{const md=MV[p];return(
                <button key={p} className="bt" style={{borderColor:TC[md[1]],color:TC[md[1]]}} onClick={()=>setMove(m.uid,mvSlot,p)}>{frn(p)} ({md[0]>0?md[0]:"St"})</button>);})}
            </div>
          </div>}
        </div>
      </div>);
    })()}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
